<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Мой сайт{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Мой сайт</a>
        <div>
            <a class="nav-link d-inline text-white" href="{% url 'pages:index' %}">Главная</a>
            <a class="nav-link d-inline text-white" href="{% url 'pages:about' %}">О нас</a>
            <a class="nav-link d-inline text-white" href="{% url 'posts:form' %}">Создать</a>
            {% if user.is_authenticated %}
            <span class="navbar-text">Пользователь: <b>{{ user.username }}</b></span>
          <li class="nav-item">
            <form method="post" action="{% url 'logout' %}" >
              {% csrf_token %}
              <button class='class="nav-link d-inline text-white" 'type="submit" class="nav-link">Выйти</button>
            </form>
          </li>
          {% else %}
          <li class="nav-item">
            <a class="nav-link d-inline text-white"{% if view_name == 'login' %} active {% endif %}" href="{% url 'login' %}">Войти</a>
          </li> 
          {% endif %}        
        </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
