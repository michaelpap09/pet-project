{% extends "base.html" %}

{% block title %}Категории{% endblock %}

{% block content %}
<h1>Категории</h1>

<ul class="list-group">
    {% for category in categories %}
    <li class="list-group-item d-flex justify-content-between">
        {{ category.name }}
        <span class="badge bg-primary">{{ category.posts.count }}</span>
    </li>
    {% endfor %}
</ul>
{% endblock %}
